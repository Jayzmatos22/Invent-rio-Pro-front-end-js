<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário Pro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="index-body text-slate-200 antialiased flex">
    <aside class="w-64 h-screen sticky top-0 glass-panel p-6 flex flex-col">
        
        <!-- LOGO -->
        <div class="mb-10 flex items-center gap-3">
            <div class="w-8 h-8 bg-green-400 rounded-full flex items-center justify-center">
                <span class="font-black text-black text-xs">IP</span>
            </div>
            <h1 class="font-bold text-xl tracking-tight text-white">InvPro <span class="text-green-500">.</span></h1>
        </div>

        <!-- NAVEGAÇÃO -->
        <nav class="flex flex-col space-y-3">
            <a href="dashboard.html" class="flex gap-4 items-center p-3 rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                    <path d="M3 12h18M3 6h18M3 18h18"></path>
                </svg>
                <span class="aside-navegation">Dashboard</span>
            </a>

            <a href="products.html" class="flex gap-4 items-center p-3 rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                <span class="aside-navegation">Produtos</span>
            </a>

            <a href="account.html" class="flex gap-4 items-center p-3 rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                    <path d="M20 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M4 21v-2a4 4 0 0 1 3-3.87"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span class="aside-navegation">Conta</span>
            </a>
        </nav>
    </aside>
    
    <!-- CONTEÚDO PRINCIPAL -->
    <main class="flex-1 p-10 flex flex-col max-w-5xl mx-auto w-full bg-gray-900/90 rounded-xl">
        
        <!-- HEADER DA PÁGINA (Topo) -->
        <header class="mb-12">
            <h1 class="text-4xl antialised font-black text-white tracking-tight mb-2">Configurações da Conta</h1>
            <p class="text-slate-400 text-lg">Gerencie suas informações pessoais e preferências de segurança.</p>
        </header>

        <!-- SEÇÃO DE PERFIL (Mudar Nome) -->
        <section class="config-card p-8 mb-8">
            <div class="flex items-center gap-4 mb-8">
                <div class="p-3 bg-green-500/10 rounded-xl">
                    <i data-lucide="user-cog" class="text-green-400 w-6 h-6"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-white">Perfil Público</h2>
                    <p class="text-sm text-slate-400">Como você aparece para o sistema.</p>
                </div>
            </div>

            <form id="updateNameForm" class="space-y-6">
                <div class="max-w-md">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Nome Completo</label>
                    <input type="text" id="newNameInput" 
                           class="input-config w-full p-4 rounded-xl text-black placeholder:text-slate-600" 
                           placeholder="Seu novo nome">
                </div>
                
                <button type="submit" class="bg-green-600 hover:bg-green-500 text-white font-bold px-8 py-3 rounded-xl transition-all active:scale-95 shadow-lg shadow-green-900/20">
                    Salvar Alterações
                </button>
            </form>
        </section>

        <!-- SEÇÃO DE SEGURANÇA (Placeholder) -->
        <section class="config-card p-8 opacity-50 cursor-not-allowed">
            <div class="flex items-center gap-4 mb-4">
                <div class="p-3 bg-blue-500/10 rounded-xl">
                    <i data-lucide="shield-check" class="text-blue-400 w-6 h-6"></i>
                </div>
                <h2 class="text-xl font-bold text-white">Segurança</h2>
            </div>
            <p class="text-sm text-slate-400">Alteração de senha em breve disponível.</p>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            const nameInput = document.querySelector('#newNameInput');
            const form = document.querySelector('#updateNameForm');

            // Carrega o nome atual no input
            const userData = JSON.parse(localStorage.getItem('registedUser') || localStorage.getItem('currentUser'));
            

            // Lógica para salvar o novo nome
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const newName = nameInput.value.trim();

                if (newName.length < 6) {
                    alert("O nome deve ter pelo menos 6 caracteres.");
                    return;
                }

                if (userData) {
                    userData.name = newName;
                    // Atualiza em ambas as chaves possíveis
                    localStorage.setItem('registedUser', JSON.stringify(userData));
                    localStorage.setItem('currentUser', JSON.stringify(userData));
                    
                    alert("Nome atualizado com sucesso!");
                    window.location.reload();
                }
            });
        });
    </script>
</body>
</html>
