<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário Pro - Produtos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../js/scripts.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="index-body text-slate-200 antialiased flex">
    <aside class="w-64 h-screen sticky top-0 glass-panel p-6 flex flex-col">
        
        <!-- LOGO -->
        <div class="mb-10 flex items-center gap-3">
            <div class="w-8 h-8 bg-green-400 rounded-full flex items-center justify-center">
                <span class="font-black text-black text-xs">IP</span>
            </div>
            <h1 class="font-bold text-xl tracking-tight text-white">InvPro <span class="text-green-500">.</span></h1>
        </div>

        <!-- NAVEGAÇÃO -->
        <nav class="flex flex-col space-y-3">
            <a href="dashboard.html" class="flex gap-4 items-center p-3 rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                    <path d="M3 12h18M3 6h18M3 18h18"></path>
                </svg>
                <span class="aside-navegation">Dashboard</span>
            </a>

            <a href="products.html" class="flex gap-4 items-center p-3 rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                <span class="aside-navegation">Produtos</span>
            </a>

            <a href="account.html" class="flex gap-4 items-center p-3 rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                    <path d="M20 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M4 21v-2a4 4 0 0 1 3-3.87"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span class="aside-navegation">Conta</span>
            </a>
        </nav>
    </aside>
    <main class="flex-1 p-10 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <div class="flex gap-4">
                    <h1 class="font-black">Gestão de Estoque</h1> <i data-lucide="package-plus"></i>
                </div>
                <br><p class="text-slate-400">Gerencie seus produtos e níveis de stock.</p>
            </div>
            <button onclick="toggleModal()" class="bg-green-500 hover:bg-green-400 text-black font-bold px-6 py-3 rounded-xl transition-all active:scale-95">
                + Novo Produto
            </button>
        </header>
        

        <!-- Tabela -->
        <div class="table-wrapper">
            <table class="w-full text-left">
                <thead>
                    <tr>
                        <th class="p-5 titleStock uppercase text-xs tracking-wider">Produto</th>
                        <th class="p-5 titleStock uppercase text-xs tracking-wider">Categoria</th>
                        <th class="p-5 titleStock uppercase text-xs tracking-wider">Preço(und)</th>
                        <th class="p-5 titleStock uppercase text-xs tracking-wider">Status</th>
                        <th class="p-5 titleStock uppercase text-xs tracking-wider text-center">Ações</th>
                    </tr>
                </thead>

                <tbody id="table-body">
                   <!--Onde o JS carregará os produtos-->
                </tbody>
            </table>
            <!-- MENSAGEM VAZIA (IMPORTANTE) -->
            <div id="empty-message" class="hidden p-20 text-center">
                <i data-lucide="package-search" class="mx-auto mb-4 text-slate-600" size="48"></i>
                <p class="text-slate-500 italic">Nenhum produto encontrado no inventário.</p>
            </div>
        </div>
    </main>


    <!-- O MODAL -->
    <div id="productModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-md p-4">
        <!--  CAIXA ÚNICA -->
        <div class="modal-card">

            <!-- CABEÇALHO  -->
            <div class="flex justify-between items-center mb-8">
                <h2 class="uppercase font-black antialiased tracking-wide [word-spacing:5px]">Adicionar Novo Produto</h2>
                <button onclick="toggleModal()" class="text-gray-400 hover:text-red-500 transition-colors">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <!-- FORMULÁRIO -->
            <form id="productForm" class="space-y-6">
                <div>
                    <label for="inputProductName">Nome do Produto (mín. 3 caracteres)</label>
                    <input type="text" id="inputProductName" name="productName" required 
                           class="w-full px-4 py-3 rounded-xl text-gray-900" 
                           placeholder="Ex: Monitor UltraWide 34">
                </div>

                <div>
                    <label for="inputProductPrice">Preço do Produto</label>
                    <input type="number" id="inputProductPrice" name="productPrice" required 
                           class="w-full px-4 py-3 rounded-xl text-gray-900" 
                           placeholder="00,00" step="0.01" min="0.1">
                </div>

                <div>
                    <label for="inputProductQuantity">Quantidade do Produto</label>
                    <input type="number" id="inputProductQuantity" name="productQuantity" required 
                           class="w-full px-4 py-3 rounded-xl text-gray-900" 
                           placeholder="0" step="1" min="1">
                </div>

                 <div>
                    <label for="inputProductCategory">Categoria do Produto</label>
                    <select id="inputProductCategory" name="productCategory" required>
                        <option value="" disabled selected>Selecione uma categoria</option>
                        <option value="Eletronicos">Eletrônicos</option>
                        <option value="Móveis">Móveis</option>
                        <option value="Roupas">Roupas</option>
                        <option value="Alimentos">Alimentos</option>
                        <option value="Materiais">Materiais</option>
                        <option value="Outros">Outros</option>
                    </select>

                <button type="submit" id="saveProduct" class="mt-4 w-full py-4 bg-green-800 text-white font-bold rounded-xl hover:bg-green-600 transition-all shadow-xl">
                    Salvar Produto
                </button>
            </form>
            
        </div>

    </div>

    <script>
        // Inicialização
        lucide.createIcons();
        const modal = document.getElementById('productModal');
        const tableBody = document.getElementById('table-body');
        const emptyMessage = document.getElementById('empty-message');
        const productForm = document.getElementById('productForm');
        const saveBtn = document.getElementById('saveProduct');

        // ==========================================
        // SEGURANÇA: VERIFICA QUEM ESTÁ LOGADO
        // ==========================================
        // 1. Resgata o usuário atual logado
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));

        // Se não tiver ninguém logado, chuta pra tela de login!
        if (!currentUser) {
            window.alert('Acesso negado! Faça login para acessar seus produtos.');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 200);
        }

        // 2. Cria uma "chave única" para os produtos DESSE usuário
        // Ex: "productsList_joao@email.com"
        const userProductsKey = 'productsList_' + currentUser.email;


        // ==========================================
        // CAMPOS E VALIDAÇÃO
        // ==========================================
        const fields = {
            name: document.getElementById('inputProductName'),
            price: document.getElementById('inputProductPrice'),
            quantity: document.getElementById('inputProductQuantity')
        };

        function toggleModal() {
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                fields.name.focus();
            }
        }

        // Validação Visual
        const validate = (el, condition) => {
            const val = el.value.trim();
            if (val === "") {
                el.classList.remove('border-valid', 'border-invalid');
                return false;
            }
            if (condition) {
                el.classList.add('border-valid');
                el.classList.remove('border-invalid');
                return true;
            } else {
                el.classList.add('border-invalid');
                el.classList.remove('border-valid');
                return false;
            }
        };

        // Escuta inputs para validar
        Object.values(fields).forEach(input => {
            input.addEventListener('input', () => {
                const isNameOk = validate(fields.name, fields.name.value.length >= 3);
                const isPriceOk = validate(fields.price, parseFloat(fields.price.value) > 0);
                const isQtyOk = validate(fields.quantity, fields.quantity.value !== "" && parseInt(fields.quantity.value) > 0);
                
                saveBtn.disabled = !(isNameOk && isPriceOk && isQtyOk);
            });
        });

        // ==========================================
        // DESENHAR TABELA
        // ==========================================
        function renderTable() {
            // 3. Lê SOMENTE os produtos da chave única deste usuário
            const products = JSON.parse(localStorage.getItem(userProductsKey)) || [];
            tableBody.innerHTML = '';

            if (products.length === 0) {
                emptyMessage.classList.remove('hidden');
                return;
            }

            emptyMessage.classList.add('hidden');
            products.forEach((product, index) => {
                const isLow = parseInt(product.quantity) <= 5;
                const row = document.createElement('tr');
                row.className = "border-b border-white/5 hover:bg-white/5 transition-all text-sm";
                row.innerHTML = `
                    <td class="p-5 hover:bg-gray-200 font-semibold text-black">${product.name}</td>
                    <td class="p-5 hover:bg-gray-200 text-slate-900">${product.category}</td>
                    <td class="p-5 hover:bg-gray-200 text-center text-green-700 font-mono font-bold">R$ ${parseFloat(product.price).toFixed(2)}</td>
                    <td class="p-5 hover:bg-gray-200 text-center">
                        <span class="status-badge ${isLow ? 'status-low' : 'status-ok'}">
                            ${isLow ? 'Stock Baixo (' + product.quantity + ')' : 'Em Stock'}
                        </span>
                    </td>
                    <td class="p-5 text-center">
                        <button onclick="removeProduct(${index})" class="text-red-400 hover:text-red-300 p-2 transition-colors">
                            <i data-lucide="trash-2" size="18"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
            lucide.createIcons();
        }

        // Remover Produto
        window.removeProduct = (index) => {
            // 4. Apaga da chave única deste usuário
            let products = JSON.parse(localStorage.getItem(userProductsKey)) || [];
            products.splice(index, 1);
            localStorage.setItem(userProductsKey, JSON.stringify(products));
            renderTable();
        };

        // Salvar Produto
        productForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newProduct = {
                name: fields.name.value.trim(),
                price: parseFloat(fields.price.value),
                quantity: parseInt(fields.quantity.value),
                category: document.getElementById('inputProductCategory').value
            };

            // 5. Salva na chave única deste usuário
            const productsList = JSON.parse(localStorage.getItem(userProductsKey)) || [];
            productsList.push(newProduct);
            localStorage.setItem(userProductsKey, JSON.stringify(productsList));
            
            alert('Produto [' + newProduct.name + '] adicionado com sucesso!');

            productForm.reset();
            Object.values(fields).forEach(el => el.classList.remove('border-valid', 'border-invalid'));
            toggleModal();
            renderTable();
        });

        // Início
        document.addEventListener('DOMContentLoaded', renderTable);
    </script>
</body>
</html>
