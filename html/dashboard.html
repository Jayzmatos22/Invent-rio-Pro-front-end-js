<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário Pro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="index-body text-slate-200 antialiased flex">
    <aside class="w-64 h-screen sticky top-0 glass-panel p-6 flex flex-col">
        
        <!-- LOGO -->
        <div class="mb-10 flex items-center gap-3">
            <div class="w-8 h-8 bg-green-400 rounded-full flex items-center justify-center">
                <span class="font-black text-black text-xs">IP</span>
            </div>
            <h1 class="font-bold text-xl tracking-tight text-white">InvPro <span class="text-green-500">.</span></h1>
        </div>

        <!-- NAVEGAÇÃO -->
        <nav class="flex flex-col space-y-3">
            <a href="dashboard.html" class="flex gap-4 items-center p-3 rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                    <path d="M3 12h18M3 6h18M3 18h18"></path>
                </svg>
                <span class="aside-navegation">Dashboard</span>
            </a>

            <a href="products.html" class="flex gap-4 items-center p-3 rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                <span class="aside-navegation">Produtos</span>
            </a>

            <a href="account.html" class="flex gap-4 items-center p-3 rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                    <path d="M20 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M4 21v-2a4 4 0 0 1 3-3.87"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span class="aside-navegation">Conta</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto bg-purple-900/20 rounded-xl">
        <header class="mb-10">
            <h1 class="text-3xl font-black text-white">Dashboard de <span id="dashUserName" class="text-green-400">...</span></h1>
            <p class="text-slate-400">Visão geral do seu patrimônio em estoque.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="modal-card !max-w-none !m-0">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="!m-0 text-sm uppercase text-slate-400">Total de Itens</h2>
                    <i data-lucide="boxes" class="text-blue-400"></i>
                </div>
                <p id="totalQty" class="text-5xl font-black text-white">0</p>
                <p class="text-xs text-slate-500 mt-2">Unidades físicas totais</p>
            </div>

            <div class="modal-card !max-w-none !m-0 border-green-500/30">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="!m-0 text-sm uppercase text-slate-400">Valor em Stock</h2>
                    <i data-lucide="circle-dollar-sign" class="text-green-400"></i>
                </div>
                <p id="totalValue" class="text-4xl font-black text-white">R$ 0,00</p>
                <p class="text-xs text-slate-500 mt-2">Soma de Preço x Quantidade</p>
            </div>

            <div class="modal-card !max-w-none !m-0 border-red-500/30">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="!m-0 text-sm uppercase text-slate-400">Itens Críticos</h2>
                    <i data-lucide="alert-triangle" class="text-red-500"></i>
                </div>
                <p id="criticalCount" class="text-5xl font-black text-red-500">0</p>
                <p class="text-xs text-slate-500 mt-2">Abaixo de 5 unidades</p>
            </div>

        </div>
    </main>

    <script>
        // Esta função roda assim que o HTML termina de carregar
        document.addEventListener('DOMContentLoaded', () => {
            // Inicializa os ícones do Lucide
            lucide.createIcons();

            // 1. Identifica o usuário (Sessão)
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            // Injeta o nome no H1
            document.getElementById('dashUserName').innerText = currentUser.name.split(' ')[0];

            // 2. Acessa a "Tabela" de produtos deste usuário específico
            const userKey = 'productsList_' + currentUser.email;
            const products = JSON.parse(localStorage.getItem(userKey)) || [];

            // 3. LÓGICA DE CÁLCULO (Igual ao processamento de dados do backend)
            let somaQuantidade = 0;
            let somaValorTotal = 0;
            let itensCriticos = 0;

            products.forEach(p => {
                const q = parseInt(p.quantity) || 0;
                const v = parseFloat(p.price) || 0;

                somaQuantidade += q;
                somaValorTotal += (q * v); // Valor total = Estoque x Preço
                
                if (q <= 5) {
                    itensCriticos++;
                }
            });

            // 4. CONVERGÊNCIA: Injeta os resultados nos IDs do HTML
            document.getElementById('totalQty').innerText = somaQuantidade;
            
            document.getElementById('totalValue').innerText = somaValorTotal.toLocaleString('pt-BR', { 
                style: 'currency', 
                currency: 'BRL' 
            });

            document.getElementById('criticalCount').innerText = itensCriticos;
        });
    </script>
</body>
</html>
